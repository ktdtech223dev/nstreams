name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      # Re-run only when Android-relevant files change
      - 'src/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'vite.config.js'
      - 'package.json'
      - '.github/workflows/android.yml'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Node 20 ─────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Java 17 (required by Gradle) ─────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Android SDK ──────────────────────────────────────────────────────────
      - uses: android-actions/setup-android@v3

      # ── Install npm dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── Build Vite for Android (bakes in Railway API URL) ───────────────────
      - name: Build web (Android target)
        run: npm run build
        env:
          VITE_PLATFORM: android
          VITE_API_URL: https://nstreams-api-production.up.railway.app/api

      # ── Sync into Android project ────────────────────────────────────────────
      - name: Capacitor sync
        run: npx cap sync android

      # ── Build debug APK ──────────────────────────────────────────────────────
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # ── Upload APK as artifact ───────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: N-Streams-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
