name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      # Re-run only when Android-relevant files change
      - 'src/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'vite.config.js'
      - 'package.json'
      - '.github/workflows/android.yml'
    tags:
      - 'v*.*.*'   # also build + publish on every version tag
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Node 22 ─────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Java 21 (required by Gradle) ─────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # ── Android SDK ──────────────────────────────────────────────────────────
      - uses: android-actions/setup-android@v3

      # ── Install npm dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: npm install

      # ── Build Vite for Android (bakes in Railway API URL + version) ─────────
      - name: Build web (Android target)
        run: npm run build
        env:
          VITE_PLATFORM: android
          VITE_API_URL: https://nstreams-api-production.up.railway.app/api

      # ── Sync into Android project ────────────────────────────────────────────
      - name: Capacitor sync
        run: npx cap sync android

      # ── Build debug APK ──────────────────────────────────────────────────────
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # ── Upload APK as workflow artifact (every build) ────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: N-Streams-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── On version tags: rename APK and attach to GitHub Release ─────────────
      - name: Rename APK for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "N-Streams-${{ github.ref_name }}-android.apk"

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: N-Streams-${{ github.ref_name }}-android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
