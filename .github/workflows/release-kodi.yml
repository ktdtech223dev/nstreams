name: Build & Release Kodi Addon (plugin.video.nstreams)

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Package the Kodi addon as plugin.video.nstreams-<version>.zip ─────────
      #
      # Kodi 21 (Omega) requires the zip to contain a single top-level folder
      # whose name matches the addon id. We copy kodi-addon/ → /tmp/plugin.video
      # .nstreams/ so the archive root is correct, strip build-only artifacts
      # (release/, .github/), then zip from /tmp so the path inside the archive
      # stays clean.
      - name: Build Kodi addon + repository zips
        run: |
          mkdir -p kodi-addon/release
          # Skip line 1 — it's <?xml version="1.0"...?> which the
          # bare /version="[0-9.]+"/ regex matches first.
          PLUGIN_VERSION=$(tail -n +2 kodi-addon/addon.xml | grep -oE 'version="[0-9.]+"' | head -1 | cut -d'"' -f2)
          REPO_VERSION=$(tail -n +2 kodi-repo/repository.nstreams/addon.xml | grep -oE 'version="[0-9.]+"' | head -1 | cut -d'"' -f2)
          if [[ ! "$PLUGIN_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Plugin version $PLUGIN_VERSION is not X.Y.Z — Kodi repo install will 404" >&2
            exit 1
          fi

          # plugin.video.nstreams-<plugin_version>.zip
          cp -r kodi-addon /tmp/plugin.video.nstreams
          rm -rf /tmp/plugin.video.nstreams/release /tmp/plugin.video.nstreams/.github
          find /tmp/plugin.video.nstreams -name '__pycache__' -type d -exec rm -rf {} + || true
          (cd /tmp && zip -r "$GITHUB_WORKSPACE/kodi-addon/release/plugin.video.nstreams-${PLUGIN_VERSION}.zip" plugin.video.nstreams)

          # repository.nstreams-<repo_version>.zip — install ONCE for auto-updates.
          cp -r kodi-repo/repository.nstreams /tmp/repository.nstreams
          (cd /tmp && zip -r "$GITHUB_WORKSPACE/kodi-addon/release/repository.nstreams-${REPO_VERSION}.zip" repository.nstreams)

      # ── Attach to the same release the Windows / Linux jobs create ────────────
      - name: Attach Kodi addon zips to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "N Streams ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            kodi-addon/release/plugin.video.nstreams-*.zip
            kodi-addon/release/repository.nstreams-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
