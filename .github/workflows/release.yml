name: Build & Release Windows EXE

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Node 20 ───────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Install deps (better-sqlite3 compiles natively on windows-latest) ─────
      - name: Install dependencies
        run: npm install

      # ── Build Vite frontend ───────────────────────────────────────────────────
      - name: Build web assets
        run: npm run build

      # ── Build portable EXE via electron-builder ───────────────────────────────
      - name: Build portable EXE
        run: npx electron-builder --win portable --x64 --publish never

      # ── Create GitHub Release and attach EXE ─────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "N Streams ${{ github.ref_name }}"
          generate_release_notes: true
          files: release/N-Streams-*-portable.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
